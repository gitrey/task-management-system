openapi: 3.0.3
info:
  title: Task Management System API
  description: API for managing and monitoring tasks in a DAG.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
paths:
  /tasks:
    get:
      summary: List all tasks
      tags:
        - Tasks
      responses:
        '200':
          description: A list of tasks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
  /tasks/execute:
    post:
      summary: Execute all ready tasks
      tags:
        - Tasks
      responses:
        '202':
          description: Execution started.
  /tasks/{taskId}:
    get:
      summary: Get task details
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found.
  /tasks/{taskId}/cancel:
    post:
      summary: Cancel a task and its dependents
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Task cancelled.
        '404':
          description: Task not found.
  /tasks/{taskId}/retry:
    post:
      summary: Manually retry a failed task
      tags:
        - Tasks
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Retry initiated.
        '404':
          description: Task not found.
        '400':
          description: Task is not in a failed state.
  /logs:
    get:
      summary: Stream execution logs
      description: Returns a stream of JSON logs. Supports filtering.
      tags:
        - Logs
      parameters:
        - name: trace_id
          in: query
          schema:
            type: string
        - name: task_id
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
            enum: [INFO, WARNING, ERROR]
      responses:
        '200':
          description: Stream of logs.
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/LogEntry'
components:
  schemas:
    TaskStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED, RETRYING]
    Task:
      type: object
      properties:
        task_id:
          type: string
        priority:
          type: integer
        status:
          $ref: '#/components/schemas/TaskStatus'
        result:
          type: object
          nullable: true
        error:
          type: string
          nullable: true
        dependencies:
          type: array
          items:
            type: string
        dependents:
          type: array
          items:
            type: string
        retries:
          type: integer
        trace_id:
          type: string
    LogEntry:
      type: object
      properties:
        timestamp:
          type: number
        level:
          type: string
        event:
          type: string
        task_id:
          type: string
          nullable: true
        trace_id:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        delay:
          type: number
          nullable: true
        retry:
          type: integer
          nullable: true
