apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: task-mgmt-gateway
  namespace: default
  annotations:
    networking.gke.io/static-ip: task-mgmt-cluster-external-ip
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: task-mgmt-route
  namespace: default
spec:
  parentRefs:
  - name: task-mgmt-gateway
  rules:
  - backendRefs:
    - name: task-mgmt-backend
      port: 8080
